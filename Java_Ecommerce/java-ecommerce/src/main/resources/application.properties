spring.application.name=java-ecommerce

# Connection Pooling:
# Maximum number of idle connections kept in the pool -> should match the number of CPU cores (max.)
spring.datasource.hikari.maximum-pool-size=10
# How long a connection can sit idle before being retired
spring.datasource.hikari.idle-timeout=30000

# Query Analysis
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# This shows the actual values (e.g., 'Berlin') instead of '?'
logging.level.org.hibernate.orm.jdbc.bind=trace

# Standardized error responses for HTTP APIs (Standardized JSON Structure for error details, Automatic Exception Handling, specialized Media Type):
spring.mvc.problemdetails.enabled=true

# Swagger UI path http://localhost:[application-port]/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
# Path were the OpenAPI doc will be generated into
springdoc.api-docs.path=/api-docs

# Database Connection Details -> Change Later
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA Settings -> Change Later
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Enable the H2 Web Console to view your data in the browser -> Delete Later
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Setting constraints on Pagination
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# Max request size to minimize overload risk -> reverse proxy or load balancer should actually handle this
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.max-file-size=10MB
server.tomcat.max-swallow-size=10MB
server.tomcat.max-http-form-post-size=10MB